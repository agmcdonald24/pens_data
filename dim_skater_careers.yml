version: 2

models:
  - name: dim_skater_careers
    description: >
      Career-level NHL skater model with one row per identified player,
      aggregated across every team and season in skater_seasons. Players who
      changed teams have all team-season rows combined using nhl_player_id.
      Source rows with a null nhl_player_id are excluded because they cannot be
      assigned safely to a stable player identity. The model retains only
      players with at least 30,000 seconds, or 500 minutes, of career ice time.
      This minimum reduces volatility from brief call-ups and other tiny
      samples such as schedule bias.

    columns:
      - name: nhl_player_id
        description: >
          Stable player identifier assigned by the NHL API and the unique key
          of this model. Unlike player_name, this field is intended to identify
          the same player across seasons and teams. Records lacking this value
          are excluded before career aggregation.
        tests:
          - unique
          - not_null

      - name: player_name
        description: >
          Player display name from the source data, formatted as last name
          followed by first name. This value is included for readability but
          must not be used as a unique identifier because different players can
          share the same name.
        tests:
          - not_null

      - name: position_group
        description: >
          Broad skater position classification from the source data: F for
          forward or D for defenseman. This model does not include goalies.
        tests:
          - not_null
          - accepted_values:
              values: ['F', 'D']

      - name: career_games_played
        description: >
          Total games played across all included seasons and teams. For a
          player who changed teams during a season, games from each team row
          are summed into the same career record.

      - name: career_goals
        description: >
          Total goals scored across all included seasons and teams.

      - name: career_assists
        description: >
          Total assists recorded across all included seasons and teams.

      - name: career_points
        description: >
          Total scoring points across all included seasons and teams. In
          hockey, a point is credited for either a goal or an assist, so this
          field is the career sum of the source points measure.

      - name: career_toi_seconds
        description: >
          Total career time on ice in seconds, summed across all included
          seasons and teams. Every row in this model has at least 30,000
          seconds of career ice time because this is the denominator used to
          enforce the minimum-sample filter.
        tests:
          - not_null

      - name: career_toi_minutes
        description: >
          Total career time on ice expressed in minutes, calculated as
          career_toi_seconds divided by 60. This is the same ice-time total as
          career_toi_seconds in a more analyst-readable unit; the model's
          inclusion threshold is 500 career minutes.

      - name: career_points_per_60
        description: >
          Scoring rate normalized to 60 minutes of ice time, calculated as
          career_points multiplied by 3,600 and divided by
          career_toi_seconds. A value of 2.0 means the player recorded two
          points for every 60 minutes played over the included career sample.
          This is a rate for comparison, not a projection, and it is reported
          only for players meeting the model's 30,000-second (500-minute)
          minimum career ice-time threshold.
        tests:
          - not_null
